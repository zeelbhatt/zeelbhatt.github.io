<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals & Ink" subtitle="Text, lines and surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px;display:flex;flex-wrap:wrap;gap:10px}
  .sw{width:calc(16.66% - 9px);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden}
  .chip{height:54px}
  .meta{padding:6px 8px}
  .name{font-size:11px;font-weight:600;color:var(--text-display)}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">Ink 900</div><div class="hex">#222</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="meta"><div class="name">Ink 800</div><div class="hex">#393939</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">Ink 700</div><div class="hex">#494949</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><div class="name">Ink 500</div><div class="hex">#727272</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="meta"><div class="name">Ink 400</div><div class="hex">#777</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-subtle)"></div><div class="meta"><div class="name">Subtle</div><div class="hex">#F8F8F8</div></div></div>
</body></html>
