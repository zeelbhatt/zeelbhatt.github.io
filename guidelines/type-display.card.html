<!-- @dsCard group="Type" viewport="700x180" name="Display & Headings" subtitle="Noto Sans, bold, tight tracking" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px 28px;color:var(--text-display)}
  .row{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border);padding:10px 0}
  .row:last-child{border:none}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:130px;flex:none}
  .display{font-size:var(--fs-display);font-weight:700;letter-spacing:var(--ls-tight);line-height:1}
  .h1{font-size:var(--fs-h1);font-weight:700;letter-spacing:var(--ls-tight)}
  .h2{font-size:var(--fs-h2);font-weight:700;color:var(--text-heading)}
</style></head><body>
  <div class="row"><span class="spec">Display · 56 / 700</span><span class="display">Zeel Bhatt</span></div>
  <div class="row"><span class="spec">H1 · 40 / 700</span><span class="h1">Teaching machines</span></div>
  <div class="row"><span class="spec">H2 · 28 / 700</span><span class="h2">Selected work</span></div>
</body></html>
