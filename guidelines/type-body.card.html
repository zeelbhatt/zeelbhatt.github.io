<!-- @dsCard group="Type" viewport="700x180" name="Body, Lead & Mono" subtitle="Reading copy + monospace labels" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px 28px}
  .lead{font-size:var(--fs-lead);color:var(--text-subhead);line-height:var(--lh-body);margin:0 0 12px;max-width:560px}
  .body{font-size:var(--fs-body);color:var(--text-body);line-height:var(--lh-body);margin:0 0 14px;max-width:560px}
  .eyebrow{font-family:var(--font-mono);font-size:var(--fs-eyebrow);letter-spacing:var(--ls-eyebrow);text-transform:uppercase;color:var(--accent)}
  a{color:var(--accent)}
</style></head><body>
  <p class="eyebrow">01 — Mono eyebrow / label</p>
  <p class="lead">Lead — 19px. A larger intro line that sets up a section with a calm, readable measure.</p>
  <p class="body">Body — 16px / 1.6. The workhorse for paragraphs. Links use the <a href="#">brand blue</a>; strong emphasis darkens to ink.</p>
</body></html>
