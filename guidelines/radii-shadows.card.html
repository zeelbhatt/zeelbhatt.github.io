<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & Shadows" subtitle="Corners and soft neutral elevation" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px 28px;display:flex;gap:20px;align-items:center}
  .box{width:96px;height:80px;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .sep{width:1px;height:80px;background:var(--border)}
</style></head><body>
  <div class="box" style="border-radius:var(--radius-sm)"><span class="lab">sm · 5</span></div>
  <div class="box" style="border-radius:var(--radius-md)"><span class="lab">md · 10</span></div>
  <div class="box" style="border-radius:var(--radius-lg)"><span class="lab">lg · 16</span></div>
  <div class="sep"></div>
  <div class="box" style="border-radius:var(--radius-md);border-color:transparent;box-shadow:var(--shadow-sm)"><span class="lab">shadow-sm</span></div>
  <div class="box" style="border-radius:var(--radius-md);border-color:transparent;box-shadow:var(--shadow-md)"><span class="lab">shadow-md</span></div>
  <div class="box" style="border-radius:var(--radius-md);border-color:transparent;box-shadow:var(--shadow-lg)"><span class="lab">shadow-lg</span></div>
</body></html>
