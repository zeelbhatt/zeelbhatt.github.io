<!-- @dsCard group="Colors" viewport="700x150" name="Brand Blue" subtitle="Link / primary accent — from the minimal theme" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px;display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden}
  .chip{height:70px}
  .meta{padding:8px 12px}
  .name{font-size:13px;font-weight:700;color:var(--text-display)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase}
  .var{font-family:var(--font-mono);font-size:10px;color:var(--accent)}
</style></head><body>
  <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">Accent</div><div class="hex">#267CB9</div><div class="var">--accent</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">Accent strong</div><div class="hex">#006699</div><div class="var">--accent-strong</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="name">Tint</div><div class="hex">#E3EEF6</div><div class="var">--accent-tint</div></div></div>
</body></html>
